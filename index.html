  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Paleta principal */
      --azul-900: #0a1a30;
      --azul-800: #122642;
      --azul-700: #1a3458;
      --azul-600: #25456f;
      --azul-100: #e8edf3;
      --azul-50: #f4f6fa;

      /* Neutros */
      --bg: #f6f7f9;
      --surface: #ffffff;
      --border: #e6e8ec;
      --border-soft: #f0f1f4;
      --text: #1a1f2e;
      --text-muted: #6b7280;
      --text-subtle: #9ca3af;

      /* Acentos */
      --verde: #10b981;
      --verde-bg: #ecfdf5;
      --verde-text: #047857;
      --amarillo: #f59e0b;
      --amarillo-bg: #fffbeb;
      --amarillo-text: #b45309;
      --rojo: #ef4444;
      --rojo-bg: #fef2f2;
      --rojo-text: #b91c1c;
      --cyan: #06b6d4;
      --cyan-bg: #ecfeff;
      --cyan-text: #0e7490;

      /* Sombras */
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06), 0 2px 4px rgba(15, 23, 42, 0.04);
      --shadow-lg: 0 10px 25px rgba(15, 23, 42, 0.08), 0 4px 10px rgba(15, 23, 42, 0.04);

      /* Radius */
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, var(--azul-800) 0%, var(--azul-700) 100%);
      color: white;
      padding: 22px 28px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      box-shadow: var(--shadow-md);
      position: relative;
    }

    .header-logo {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      filter: brightness(0) invert(1);
      opacity: 0.95;
    }

    .header-text { flex: 1; min-width: 140px; }

    .header h1 {
      font-family: 'Montserrat', 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .header .subtitle {
      font-size: 12.5px;
      color: rgba(255,255,255,0.65);
      font-weight: 500;
      margin-top: 2px;
      letter-spacing: 0.01em;
    }

    .save-status {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }
    .save-status::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--verde);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
    }
    .save-status[data-status="saving"]::before { background: var(--amarillo); box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2); }
    .save-status[data-status="error"]::before { background: var(--rojo); box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2); }

    /* NAV TABS */
    .nav-tabs {
      display: flex;
      gap: 4px;
      padding: 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }

    .nav-tab {
      border: none;
      background: transparent;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      transition: all 0.15s ease;
      white-space: nowrap;
      font-family: inherit;
    }
    .nav-tab:hover { background: var(--azul-50); color: var(--azul-700); }
    .nav-tab.active {
      background: var(--azul-800);
      color: white;
      box-shadow: var(--shadow-sm);
    }

    /* CONTENT */
    .content {
      background: var(--surface);
      padding: 28px;
      min-height: 60vh;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      box-shadow: var(--shadow);
    }

    /* RESUMEN — Cards */
    .resumen-wrapper {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
      max-width: 760px;
    }

    .resumen-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow 0.2s ease;
    }
    .resumen-card:hover { box-shadow: var(--shadow-md); }

    .resumen-card-header {
      background: var(--azul-50);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .resumen-card-header h3 {
      font-size: 13px;
      font-weight: 700;
      color: var(--azul-800);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .resumen-card-body { padding: 4px 0; }

    .resumen-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border-soft);
    }
    .resumen-row:last-child { border-bottom: none; }

    .resumen-row .label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .resumen-row .value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .resumen-row.highlight .value {
      color: var(--azul-800);
      font-weight: 700;
      font-size: 15px;
    }

    /* SECTION TITLE */
    .section-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--azul-900);
      letter-spacing: -0.01em;
    }
    .section-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    /* TABLAS */
    .tabla-wrapper {
      overflow-x: auto;
      margin-bottom: 28px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    table.tabla-datos {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    table.tabla-datos th {
      background: var(--azul-50);
      padding: 11px 14px;
      text-align: left;
      font-weight: 700;
      color: var(--azul-800);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    table.tabla-datos td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border-soft);
      color: var(--text);
    }
    table.tabla-datos tr:last-child td { border-bottom: none; }
    table.tabla-datos tbody tr:hover { background: var(--azul-50); }
    table.tabla-datos tr.total-row:hover { background: var(--azul-100); }

    .num { text-align: right; font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

    /* CELDAS EDITABLES */
    .editable {
      cursor: text;
      min-height: 24px;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      transition: all 0.12s ease;
      margin: -4px -8px;
    }
    .editable:hover {
      background: var(--azul-50);
      border-color: var(--azul-100);
    }
    .editable:focus {
      outline: none;
      border-color: var(--azul-600);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(37, 69, 111, 0.12);
    }

    /* ESTADOS */
    .estado-btn {
      border: none;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      min-width: 120px;
      text-align: center;
      transition: all 0.12s ease;
      font-family: inherit;
    }
    .estado-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }

    .estado-PAGO { background: var(--verde-bg); color: var(--verde-text); }
    .estado-PAGAR { background: var(--amarillo-bg); color: var(--amarillo-text); }
    .estado-SIN { background: var(--rojo-bg); color: var(--rojo-text); }
    .estado-DEBITO { background: var(--cyan-bg); color: var(--cyan-text); }
    .estado-NA { background: #f0f1f4; color: #6b7280; }

    /* Botón eliminar sutil */
    .btn-delete-row {
      background: transparent;
      border: none;
      color: var(--text-subtle);
      font-size: 16px;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
      line-height: 1;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-delete-row:hover {
      color: var(--rojo);
      background: var(--rojo-bg);
    }

    .estado-dropdown { position: relative; display: inline-block; }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 100;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-lg);
      min-width: 150px;
      overflow: hidden;
      padding: 4px;
    }

    .dropdown-item {
      padding: 6px 10px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-radius: 999px;
      text-align: center;
      margin: 2px 0;
      transition: filter 0.12s;
    }
    .dropdown-item:hover { filter: brightness(0.93); }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* TOTAL ROW */
    .total-row {
      background: var(--azul-50);
      font-weight: 700;
    }
    .total-row td {
      padding: 12px 14px;
      border-top: 2px solid var(--azul-700);
      color: var(--azul-900);
      font-size: 13.5px;
    }

    /* HELP TEXT */
    .help-text {
      font-size: 12.5px;
      color: var(--text-muted);
      margin-bottom: 16px;
      padding: 10px 14px;
      background: var(--azul-50);
      border-left: 3px solid var(--azul-600);
      border-radius: var(--radius-sm);
    }
    .help-text strong { color: var(--azul-800); }

    /* BOTÓN AGREGAR */
    .btn-add {
      background: var(--azul-800);
      color: white;
      border: none;
      padding: 9px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      margin-top: 4px;
      transition: all 0.15s;
      font-family: inherit;
      box-shadow: var(--shadow-sm);
    }
    .btn-add:hover { background: var(--azul-900); transform: translateY(-1px); box-shadow: var(--shadow); }

    /* BOTÓN COPIAR */
    .btn-copy {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--azul-700);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      line-height: 1;
    }
    .btn-copy:hover {
      background: var(--azul-100);
      border-color: var(--azul-600);
      transform: scale(1.05);
    }
    .btn-copy.copied {
      background: var(--verde-bg);
      color: var(--verde-text);
      border-color: var(--verde);
    }

    /* DEUDORES */
    .deudores-section {
      margin-top: 16px;
      max-width: 760px;
    }
    .deudores-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }
    .deudores-table th {
      background: var(--azul-50);
      padding: 8px 14px;
      text-align: left;
      font-weight: 700;
      color: var(--azul-800);
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }
    .deudores-table td {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border-soft);
    }
    .deudores-table tbody tr:last-child td {
      border-bottom: none;
    }
    .deudores-table tbody tr:hover {
      background: var(--azul-50);
    }
    .deudores-table .debe-monto {
      color: var(--rojo);
      font-weight: 600;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .deudores-empty {
      padding: 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }
    .deudores-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .deudores-badge.rivera {
      background: #e8edf3;
      color: var(--azul-800);
    }
    .deudores-badge.bucarelli {
      background: #fff3cd;
      color: #856404;
    }

    /* TODOS / TAREAS */
    .notas-section {
      margin-top: 28px;
      max-width: 760px;
    }
    .notas-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .notas-card-header {
      background: var(--azul-50);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .notas-card-header h3 {
      font-size: 13px;
      font-weight: 700;
      color: var(--azul-800);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .todos-list {
      padding: 4px 0;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border-soft);
      transition: background 0.12s;
    }
    .todo-item:last-of-type {
      border-bottom: none;
    }
    .todo-item:hover {
      background: var(--azul-50);
    }
    .todo-check {
      cursor: pointer;
      width: 18px;
      height: 18px;
      accent-color: var(--azul-800);
      flex-shrink: 0;
    }
    .todo-text {
      flex: 1;
      outline: none;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.4;
      border: 1px solid transparent;
      transition: all 0.12s;
      min-height: 22px;
    }
    .todo-text:hover {
      border-color: var(--border);
    }
    .todo-text:focus {
      background: var(--surface);
      border-color: var(--azul-600);
      box-shadow: 0 0 0 3px rgba(37, 69, 111, 0.12);
    }
    .todo-text:empty:before {
      content: 'Escribí una tarea…';
      color: var(--text-subtle);
      font-style: italic;
    }
    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: var(--text-subtle);
    }
    .todos-empty {
      padding: 18px 14px;
      text-align: center;
      color: var(--text-subtle);
      font-size: 13px;
      font-style: italic;
    }
    .btn-add-todo {
      margin: 10px 14px 14px;
      background: transparent;
      color: var(--azul-700);
      border: 1px dashed var(--border);
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-add-todo:hover {
      background: var(--azul-50);
      border-color: var(--azul-600);
      border-style: solid;
    }

    /* SECCIÓN DE GASTOS */
    .gastos-section { margin-bottom: 36px; }
    .gastos-section:last-child { margin-bottom: 0; }

    /* MOBILE */
    @media (max-width: 768px) {
      html, body { font-size: 13px; }
      .container { padding: 6px 6px 16px; }
      .header { padding: 10px 12px; gap: 8px; border-radius: 10px 10px 0 0; }
      .header-logo { width: 28px; height: 28px; }
      .header h1 { font-size: 14.5px; letter-spacing: 0.02em; }
      .header .subtitle { font-size: 10.5px; margin-top: 1px; }
      .save-status { font-size: 10px; gap: 4px; }
      .save-status::before { width: 6px; height: 6px; }

      .nav-tabs { padding: 4px; gap: 2px; }
      .nav-tab { padding: 6px 10px; font-size: 11.5px; }

      .content { padding: 10px 10px; border-radius: 0 0 10px 10px; }

      .section-title { font-size: 14px; }
      .section-subtitle { font-size: 11.5px; margin-bottom: 10px; }

      /* Resumen ultra compacto en mobile */
      .resumen-wrapper {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .resumen-card { border-radius: 8px; }
      .resumen-card-header { padding: 6px 10px; }
      .resumen-card-header h3 { font-size: 11px; letter-spacing: 0.04em; }
      .resumen-row { padding: 6px 10px; }
      .resumen-row .label { font-size: 12px; }
      .resumen-row .value { font-size: 12.5px; }
      .resumen-row.highlight .value { font-size: 13.5px; }

      /* Tareas compactas */
      .notas-section { margin-top: 12px; }
      .notas-card-header { padding: 6px 10px; }
      .notas-card-header h3 { font-size: 11px; }
      .todo-item { padding: 5px 10px; gap: 7px; }
      .todo-check { width: 16px; height: 16px; }
      .todo-text { font-size: 13px; padding: 3px 6px; }
      .btn-add-todo { margin: 6px 10px 10px; padding: 6px 10px; font-size: 12px; }
      .todos-empty { padding: 14px 10px; font-size: 12px; }

      /* Tablas más compactas */
      table.tabla-datos { font-size: 11px; }
      table.tabla-datos th { padding: 6px 6px; font-size: 9.5px; letter-spacing: 0.03em; }
      table.tabla-datos td { padding: 5px 6px; }
      .estado-btn { min-width: 72px; padding: 3px 6px; font-size: 9px; letter-spacing: 0.02em; }
      .help-text { padding: 7px 9px; font-size: 11px; margin-bottom: 10px; border-radius: 4px; }
      .editable { padding: 2px 5px; margin: -2px -5px; }
      .total-row td { padding: 7px 6px; font-size: 11.5px; }
      .btn-add { padding: 7px 12px; font-size: 12px; }
      .btn-delete-row { font-size: 14px; padding: 1px 6px; }
      .btn-copy { font-size: 10px; padding: 2px 5px; }

      /* Dropdown menu más compacto */
      .dropdown-menu { min-width: 130px; }
      .dropdown-item { padding: 5px 8px; font-size: 10px; }

      .gastos-section { margin-bottom: 22px; }

      /* Deudores mobile */
      .deudores-section { margin-top: 12px; }

  <script>
    window.addEventListener('DOMContentLoaded', initApp);

    async function initApp() {
      const SUPABASE_URL = 'https://kdyhxowfebovndjufdvp.supabase.co';
      const SUPABASE_KEY = 'sb_publishable_eGTaa0rEPe-NDqpA5sREYg_Q3kQWJsr';
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // Mostrar mes actual dinámicamente
      const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
      const ahora = new Date();
      document.getElementById('mes-actual').textContent = `${meses[ahora.getMonth()]} ${ahora.getFullYear()}`;

      let currentView = 'resumen';
      let edificios = {};
      let edificiosArr = [];
      let todos = [];

      // ---------- HELPERS ----------
      function money(v) {
        if (v === null || v === undefined || v === '') return '';
        const n = Number(v);
        if (!isFinite(n)) return '';
        return '$ ' + n.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function parseMoneyInput(raw) {
        if (raw === '' || raw === null || raw === undefined) return null;
        // Quita símbolos de moneda y espacios
        let s = String(raw).trim().replace(/\$|\s/g, '');
        // Argentina: punto miles, coma decimal
        // Excel puede dar números crudos o con coma
        if (s.includes(',')) {
          s = s.replace(/\./g, '').replace(',', '.');
        }
        const n = parseFloat(s);
        return isFinite(n) ? n : null;
      }

      function updateSaveStatus(status) {
        const el = document.getElementById('save-status');
        if (status === 'saving') {
          el.textContent = 'Guardando…';
          el.dataset.status = 'saving';
        } else if (status === 'error') {
          el.textContent = 'Error al guardar';
          el.dataset.status = 'error';
        } else {
          el.textContent = 'Sincronizado';
          el.dataset.status = 'connected';
        }
      }

      // ---------- RESET MENSUAL DE GASTOS ----------
      async function checkMonthlyReset() {
        try {
          const ahora = new Date();
          const mesActual = `${ahora.getFullYear()}-${String(ahora.getMonth() + 1).padStart(2, '0')}`;

          // Leer último mes registrado en la tabla meta
          const { data: metaData } = await sb.from('meta').select('*').limit(1);

          if (!metaData || metaData.length === 0) {
            // No hay registro en meta, crear uno
            await sb.from('meta').insert([{ mes_actual: mesActual }]);
            return;
          }

          const meta = metaData[0];
          const ultimoMes = meta.mes_actual;

          // Si el formato no es YYYY-MM (es viejo), solo actualizar sin resetear
          if (!ultimoMes || !/^\d{4}-\d{2}$/.test(ultimoMes)) {
            await sb.from('meta').update({ mes_actual: mesActual }).eq('id', meta.id);
            return;
          }

          // Si el mes coincide con el último registrado, no hacer nada
          if (ultimoMes === mesActual) return;

          // El mes cambió: resetear gastos (excepto DEBITO)
          console.log(`Reset mensual: ${ultimoMes} → ${mesActual}`);
          const { error: resetError } = await sb.from('gastos')
            .update({ estado: 'NA' })
            .or('estado.is.null,estado.neq.DEBITO');

          if (resetError) {
            console.error('Error al resetear estados:', resetError);
            return;
          }

          // Marcar el nuevo mes como procesado
          await sb.from('meta').update({ mes_actual: mesActual }).eq('id', meta.id);
        } catch (err) {
          console.error('Error en checkMonthlyReset:', err);
        }
      }

      // ---------- CARGA INICIAL ----------
      async function loadData() {
        try {
          updateSaveStatus('saving');

          // Reset mensual: si el mes cambió, los estados (excepto DEBITO) vuelven a "—"
          await checkMonthlyReset();

          const { data: edData, error: e1 } = await sb.from('edificios').select('*').order('id');
          if (e1) throw e1;

          edificiosArr = edData;
          for (const ed of edData) {
            edificios[ed.clave] = { id: ed.id, nombre: ed.nombre, gastos: [], unidades: [] };
          }

          const { data: gastosData, error: e2 } = await sb.from('gastos').select('*').order('id');
          if (e2) throw e2;
          for (const g of gastosData) {
            const k = edData.find(e => e.id === g.edificio_id)?.clave;
            if (k) edificios[k].gastos.push(g);
          }

          const { data: unidadesData, error: e3 } = await sb.from('unidades').select('*').order('id');
          if (e3) throw e3;
          for (const u of unidadesData) {
            const k = edData.find(e => e.id === u.edificio_id)?.clave;
            if (k) edificios[k].unidades.push(u);
          }

          // Cargar todos
          const { data: todosData } = await sb.from('todos').select('*').order('id');
          if (todosData) {
            todos = todosData;
          }

          setupRealtime();
          updateSaveStatus('connected');
          render();
        } catch (err) {
          console.error('Error cargando:', err);
          updateSaveStatus('error');
        }
      }

      function setupRealtime() {
        sb.channel('gastos-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'gastos' }, (payload) => {
            const k = edificiosArr.find(e => e.id === (payload.new?.edificio_id || payload.old?.edificio_id))?.clave;
            if (!k) return;
            if (payload.eventType === 'INSERT') {
              if (!edificios[k].gastos.find(g => g.id === payload.new.id)) {
                edificios[k].gastos.push(payload.new);
              }
            } else if (payload.eventType === 'UPDATE') {
              const i = edificios[k].gastos.findIndex(g => g.id === payload.new.id);
              if (i !== -1) edificios[k].gastos[i] = payload.new;
            } else if (payload.eventType === 'DELETE') {
              edificios[k].gastos = edificios[k].gastos.filter(g => g.id !== payload.old.id);
            }
            render();
          }).subscribe();

        sb.channel('unidades-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'unidades' }, (payload) => {
            const k = edificiosArr.find(e => e.id === (payload.new?.edificio_id || payload.old?.edificio_id))?.clave;
            if (!k) return;
            if (payload.eventType === 'UPDATE') {
              const i = edificios[k].unidades.findIndex(u => u.id === payload.new.id);
              if (i !== -1) edificios[k].unidades[i] = payload.new;
            }
            render();
          }).subscribe();
      }

      // ---------- RENDER ----------
      function render() {
        document.querySelectorAll('.nav-tab').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.view === currentView);
          btn.onclick = () => { currentView = btn.dataset.view; render(); };
        });

        const c = document.getElementById('content');
        if (currentView === 'resumen') c.innerHTML = renderResumen();
        else if (currentView === 'gastos') { c.innerHTML = renderGastos(); attachGastosHandlers(); }
        else if (currentView === 'pagos-rivera') { c.innerHTML = renderPagos('rivera'); attachPagosHandlers('rivera'); }
        else if (currentView === 'pagos-bucarelli') { c.innerHTML = renderPagos('bucarelli'); attachPagosHandlers('bucarelli'); }
      }

      function renderResumen() {
        let html = '<div class="resumen-wrapper">';
        for (const [k, ed] of Object.entries(edificios)) {
          const totalCobrar = ed.unidades.reduce((s, u) => s + (u.saldo || 0), 0);
          const totalCobrado = ed.unidades.reduce((s, u) => s + (u.pago || 0), 0);
          const pendiente = totalCobrar - totalCobrado;
          // Solo cuenta como deudor si debe más de $1 (ignora diferencias por centavos)
          const conDeuda = ed.unidades.filter(u => ((u.saldo || 0) - (u.pago || 0)) > 1).length;
          const gastosPend = ed.gastos.filter(g => g.estado === 'PAGAR' || g.estado === '' || !g.estado).length;

          html += `
            <div class="resumen-card">
              <div class="resumen-card-header">
                <h3>${ed.nombre}</h3>
              </div>
              <div class="resumen-card-body">
                <div class="resumen-row highlight"><span class="label">Total a cobrar este mes</span><span class="value">${money(totalCobrar)}</span></div>
                <div class="resumen-row"><span class="label">Total cobrado</span><span class="value">${money(totalCobrado)}</span></div>
                <div class="resumen-row"><span class="label">Saldo pendiente de cobro</span><span class="value">${money(pendiente)}</span></div>
                <div class="resumen-row"><span class="label">Unidades con deuda</span><span class="value">${conDeuda}</span></div>
                <div class="resumen-row"><span class="label">Gastos pendientes de pago</span><span class="value">${gastosPend}</span></div>
              </div>
            </div>
          `;
        }
        html += '</div>';

        // Sección de Tareas / To-Do List
        const todosHtml = todos.length === 0
          ? '<div class="todos-empty">No hay tareas pendientes</div>'
          : todos.map(t => `
              <div class="todo-item ${t.completado ? 'completed' : ''}" data-id="${t.id}">
                <input type="checkbox" class="todo-check" ${t.completado ? 'checked' : ''} data-id="${t.id}">
                <div class="todo-text" contenteditable="true" data-id="${t.id}">${(t.texto || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                <button class="btn-delete-row todo-delete" data-id="${t.id}" title="Eliminar tarea">×</button>
              </div>
            `).join('');

        html += `
          <div class="notas-section">
            <div class="notas-card">
              <div class="notas-card-header">
                <h3>Tareas pendientes</h3>
              </div>
              <div class="todos-list">
                ${todosHtml}
              </div>
              <button class="btn-add-todo" id="btn-add-todo">+ Agregar tarea</button>
            </div>
          </div>
        `;

        // Sección de Deudores
        const deudores = [];
        for (const [k, ed] of Object.entries(edificios)) {
          const corto = ed.nombre.split(' ')[0]; // "Rivera" o "Bucarelli"
          const claseBadge = k; // 'rivera' o 'bucarelli'
          for (const u of ed.unidades) {
            const debe = (u.saldo || 0) - (u.pago || 0);
            if (debe > 1) {
              deudores.push({
                edificio: corto,
                claseBadge: claseBadge,
                piso: u.piso || '',
                vecino: u.vecino || '',
                debe: debe
              });
            }
          }
        }

        // Función para ordenar por piso (ej: Local, PB, 1ºA, 1ºB, 2ºA... 🅿️)
        function pisoSortKey(piso) {
          if (!piso) return [999, ''];
          const lower = piso.toLowerCase();
          if (lower.includes('local')) return [-2, ''];
          if (lower.includes('cochera') || lower.includes('coch.') || piso.includes('🅿️')) return [200, ''];
          if (lower.includes('pb')) {
            const letra = piso.match(/[A-Z]$/i)?.[0] || '';
            return [0, letra];
          }
          const numMatch = piso.match(/(\d+)/);
          const num = numMatch ? parseInt(numMatch[1]) : 999;
          const letra = piso.match(/[A-Z]$/i)?.[0] || '';
          return [num, letra];
        }

        // Orden: Rivera primero (luego Bucarelli), y dentro de cada edificio por piso
        deudores.sort((a, b) => {
          if (a.claseBadge !== b.claseBadge) {
            return a.claseBadge === 'rivera' ? -1 : 1;
          }
          const [aN, aL] = pisoSortKey(a.piso);
          const [bN, bL] = pisoSortKey(b.piso);
          if (aN !== bN) return aN - bN;
          return aL.localeCompare(bL);
        });

        let deudoresBody;
        if (deudores.length === 0) {
          deudoresBody = '<div class="deudores-empty">🎉 No hay unidades con deuda</div>';
        } else {
          deudoresBody = `
            <table class="deudores-table">
              <thead>
                <tr>
                  <th style="width: 90px;">Edificio</th>
                  <th style="width: 70px;">Piso</th>
                  <th>Vecino</th>
                  <th class="num" style="width: 130px;">Debe</th>
                </tr>
              </thead>
              <tbody>
                ${deudores.map(d => `
                  <tr>
                    <td><span class="deudores-badge ${d.claseBadge}">${d.edificio}</span></td>
                    <td>${d.piso}</td>
                    <td>${d.vecino}</td>
                    <td class="debe-monto">${money(d.debe)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        }

        const tituloDeudores = deudores.length === 0
          ? 'Deudores'
          : `Deudores · ${deudores.length} ${deudores.length === 1 ? 'unidad' : 'unidades'}`;

        html += `
          <div class="deudores-section">
            <div class="notas-card">
              <div class="notas-card-header">
                <h3>${tituloDeudores}</h3>
              </div>
              ${deudoresBody}
            </div>
          </div>
        `;

        // Attach handlers después de renderizar
        setTimeout(() => attachTodoHandlers(), 0);

        return html;
      }

      // Handlers para to-dos
      function attachTodoHandlers() {
        // Checkbox: toggle completado
        document.querySelectorAll('.todo-check').forEach(chk => {
          chk.onchange = async () => {
            const id = parseInt(chk.dataset.id);
            const completado = chk.checked;
            updateSaveStatus('saving');
            const { error } = await sb.from('todos').update({ completado }).eq('id', id);
            if (error) {
              updateSaveStatus('error');
              console.error(error);
            } else {
              updateSaveStatus('connected');
              // Actualizar state local
              const todo = todos.find(t => t.id === id);
              if (todo) todo.completado = completado;
              // Actualizar visualmente sin re-render
              const item = chk.closest('.todo-item');
              if (item) item.classList.toggle('completed', completado);
            }
          };
        });

        // Texto editable
        document.querySelectorAll('.todo-text').forEach(el => {
          el.addEventListener('focus', () => {
            el.dataset.original = el.textContent;
          });
          el.addEventListener('blur', async () => {
            const newVal = el.textContent.trim();
            if (newVal === el.dataset.original) return;
            const id = parseInt(el.dataset.id);
            updateSaveStatus('saving');
            const { error } = await sb.from('todos').update({ texto: newVal }).eq('id', id);
            if (error) {
              updateSaveStatus('error');
            } else {
              updateSaveStatus('connected');
              const todo = todos.find(t => t.id === id);
              if (todo) todo.texto = newVal;
            }
          });
          el.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
          });
        });

        // Botón eliminar (X)
        document.querySelectorAll('.todo-delete').forEach(btn => {
          btn.onclick = async () => {
            const id = parseInt(btn.dataset.id);
            updateSaveStatus('saving');
            const { error } = await sb.from('todos').delete().eq('id', id);
            if (error) {
              updateSaveStatus('error');
              console.error(error);
            } else {
              updateSaveStatus('connected');
              // Actualizar state local
              todos = todos.filter(t => t.id !== id);
              // Re-renderizar la vista
              if (currentView === 'resumen') render();
            }
          };
        });

        // Botón agregar tarea
        const btnAdd = document.getElementById('btn-add-todo');
        if (btnAdd) {
          btnAdd.onclick = async () => {
            updateSaveStatus('saving');
            const { data, error } = await sb.from('todos').insert([{
              texto: '', completado: false
            }]).select();
            if (error) {
              updateSaveStatus('error');
              console.error(error);
            } else {
              updateSaveStatus('connected');
              if (data && data.length > 0) {
                todos.push(data[0]);
                render();
                // Poner foco en el nuevo input
                setTimeout(() => {
                  const newId = data[0].id;
                  const el = document.querySelector(`.todo-text[data-id="${newId}"]`);
                  if (el) el.focus();
                }, 50);
              }
            }
          };
        }
      }

        if (e === 'NA') return '—';
        return 'SIN FACTURA';

        if (e === 'DEBITO') return 'estado-DEBITO';

      // ---------- HANDLERS GASTOS ----------
      function attachGastosHandlers() {
        // Editar texto de gasto/factura
        document.querySelectorAll('#content .editable').forEach(el => {
          el.contentEditable = 'true';
          
          el.addEventListener('focus', () => {
            el.dataset.original = el.textContent;
          });

          el.addEventListener('blur', async () => {
            const newVal = el.textContent.trim();
            if (newVal === el.dataset.original) return;
            const id = parseInt(el.dataset.id);
            const field = el.dataset.field;
            updateSaveStatus('saving');
            const { error } = await sb.from('gastos').update({ [field]: newVal }).eq('id', id);
            updateSaveStatus(error ? 'error' : 'connected');
          });

          el.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
          });
        });

        // Dropdown de estado
        document.querySelectorAll('.estado-btn').forEach(btn => {
          btn.onclick = (e) => {
            e.stopPropagation();
            document.querySelectorAll('.dropdown-menu').forEach(m => m.remove());

            const menu = document.createElement('div');
            menu.className = 'dropdown-menu';
            const opciones = [
              { val: '', label: 'SIN FACTURA', clase: 'estado-SIN' },
              { val: 'PAGAR', label: 'PAGAR', clase: 'estado-PAGAR' },
              { val: 'PAGO', label: 'PAGO', clase: 'estado-PAGO' },
              { val: 'DEBITO', label: 'DÉBITO', clase: 'estado-DEBITO' },
              { val: 'NA', label: '—', clase: 'estado-NA' }
            ];
            opciones.forEach(opt => {
              const item = document.createElement('div');
              item.className = `dropdown-item ${opt.clase}`;
              item.textContent = opt.label;
              item.onclick = async () => {
                const id = parseInt(btn.dataset.id);
                updateSaveStatus('saving');
                const { error } = await sb.from('gastos').update({ estado: opt.val }).eq('id', id);
                if (error) {
                  updateSaveStatus('error');
                } else {
                  updateSaveStatus('connected');
                  // Actualizar state local
                  for (const k of Object.keys(edificios)) {
                    const gasto = edificios[k].gastos.find(g => g.id === id);
                    if (gasto) {
                      gasto.estado = opt.val;
                      break;
                    }
                  }
                  // Actualizar el botón visualmente sin re-render completo
                  btn.className = `estado-btn ${estadoClase(opt.val)}`;
                  btn.textContent = estadoLabel(opt.val);
                  btn.dataset.current = opt.val;
                }
                menu.remove();
              };
              menu.appendChild(item);
            });
            btn.parentElement.appendChild(menu);
          };
        });

        // Cerrar dropdown al click afuera
        document.addEventListener('click', (e) => {
          if (!e.target.closest('.estado-dropdown')) {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.remove());
          }
        });

        // Botón eliminar gasto
        document.querySelectorAll('.btn-delete-row').forEach(btn => {
          btn.onclick = async () => {
            if (!confirm('¿Eliminar este gasto?')) return;
            const id = parseInt(btn.dataset.id);
            const k = btn.dataset.key;
            updateSaveStatus('saving');
            const { error } = await sb.from('gastos').delete().eq('id', id);
            if (error) {
              updateSaveStatus('error');
              console.error(error);
            } else {
              updateSaveStatus('connected');
              // Actualizar state local
              edificios[k].gastos = edificios[k].gastos.filter(g => g.id !== id);
              // Quitar la fila visualmente
              const row = btn.closest('tr');
              if (row) row.remove();
            }
          };
        });

        // Botón agregar gasto
        document.querySelectorAll('.btn-add').forEach(btn => {
          btn.onclick = async () => {
            const k = btn.dataset.key;
            const edId = edificios[k].id;
            updateSaveStatus('saving');
            const { data, error } = await sb.from('gastos').insert([{
              edificio_id: edId, gasto: '', factura: '', estado: '', eliminable: true
            }]).select();
            if (error) {
              updateSaveStatus('error');
              console.error(error);
            } else {
              updateSaveStatus('connected');
              // Agregar al state local y re-renderizar
              if (data && data.length > 0) {
                edificios[k].gastos.push(data[0]);
                render();
              }
            }
          };
        });
      }

      // ---------- HANDLERS PAGOS ----------
      function attachPagosHandlers(edKey) {
        const saldoCells = Array.from(document.querySelectorAll('#content .editable[data-field="saldo"]'));
        const pagoCells = Array.from(document.querySelectorAll('#content .editable[data-field="pago"]'));

        // Refrescar columna DEBE de una fila específica
        function refreshDebeCell(unidadId) {
          const unidad = edificios[edKey].unidades.find(u => u.id === unidadId);
          if (!unidad) return;
          const row = document.querySelector(`#content tr[data-id="${unidadId}"]`);
          if (!row) return;
          const debeCell = row.cells[5];
          const debe = (unidad.saldo || 0) - (unidad.pago || 0);
          debeCell.textContent = Math.abs(debe) < 1 ? '—' : money(debe);
          debeCell.style.color = debe > 1 ? 'var(--rojo)' : debe < -1 ? 'var(--cyan-text)' : 'var(--text-subtle)';
          debeCell.style.fontWeight = Math.abs(debe) > 1 ? '600' : '400';
        }

        // Refrescar fila TOTAL
        function refreshTotalRow() {
          const ed = edificios[edKey];
          const totalRow = document.querySelector('#content .total-row');
          if (!totalRow) return;
          const totalSaldo = ed.unidades.reduce((s, u) => s + (u.saldo || 0), 0);
          const totalPago = ed.unidades.reduce((s, u) => s + (u.pago || 0), 0);
          const totalDebe = totalSaldo - totalPago;
          totalRow.cells[1].textContent = money(totalSaldo);
          totalRow.cells[2].textContent = money(totalPago);
          totalRow.cells[3].textContent = money(totalDebe);
        }

        function attach(cells) {
          cells.forEach((el, idx) => {
            el.contentEditable = 'true';

            el.addEventListener('focus', () => {
              // Al hacer focus, mostrar el número crudo (sin formato $)
              const raw = el.dataset.raw;
              if (raw) el.textContent = raw;
              // Seleccionar el contenido
              setTimeout(() => {
                const range = document.createRange();
                range.selectNodeContents(el);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
              }, 0);
            });

            el.addEventListener('blur', async () => {
              const newVal = parseMoneyInput(el.textContent.trim());
              const id = parseInt(el.dataset.id);
              const field = el.dataset.field;
              const oldRaw = el.dataset.raw === '' ? null : parseFloat(el.dataset.raw);
              
              if (newVal === oldRaw) {
                // No hubo cambio, restaurar formato
                el.textContent = newVal !== null ? money(newVal) : '';
                return;
              }
              
              updateSaveStatus('saving');
              const { error } = await sb.from('unidades').update({ [field]: newVal }).eq('id', id);
              if (error) {
                updateSaveStatus('error');
                console.error(error);
              } else {
                updateSaveStatus('connected');
                el.dataset.raw = newVal !== null ? newVal : '';
                el.textContent = newVal !== null ? money(newVal) : '';
                
                // Actualizar state local y refrescar columna DEBE y TOTAL
                const unidad = edificios[edKey].unidades.find(u => u.id === id);
                if (unidad) {
                  unidad[field] = newVal;
                  refreshDebeCell(id);
                  refreshTotalRow();
                }
              }
            });

            el.addEventListener('keydown', (e) => {
              if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
              if (e.key === 'Escape') {
                el.textContent = el.dataset.raw ? money(parseFloat(el.dataset.raw)) : '';
                el.blur();
              }
            });

            // Pegar columna desde Excel
            el.addEventListener('paste', async (e) => {
              const text = (e.clipboardData || window.clipboardData).getData('text');
              const lines = text.split(/\r?\n/).map(s => s.trim()).filter(s => s.length > 0);

              if (lines.length > 1) {
                e.preventDefault();
                
                // Distribuir desde la celda actual hacia abajo
                updateSaveStatus('saving');
                const updates = [];
                const affectedIds = [];
                for (let i = 0; i < lines.length && (idx + i) < cells.length; i++) {
                  const targetCell = cells[idx + i];
                  const newVal = parseMoneyInput(lines[i]);
                  const id = parseInt(targetCell.dataset.id);
                  const field = targetCell.dataset.field;
                  
                  // Actualizar visualmente
                  targetCell.dataset.raw = newVal !== null ? newVal : '';
                  targetCell.textContent = newVal !== null ? money(newVal) : '';
                  
                  // Actualizar state local
                  const unidad = edificios[edKey].unidades.find(u => u.id === id);
                  if (unidad) {
                    unidad[field] = newVal;
                    affectedIds.push(id);
                  }
                  
                  // Preparar update
                  updates.push(sb.from('unidades').update({ [field]: newVal }).eq('id', id));
                }
                
                try {
                  await Promise.all(updates);
                  updateSaveStatus('connected');
                  // Refrescar todas las filas afectadas + total
                  affectedIds.forEach(id => refreshDebeCell(id));
                  refreshTotalRow();
                  el.blur();
                } catch (err) {
                  console.error(err);
                  updateSaveStatus('error');
                }
              }
              // Si es una sola línea, dejar que el paste default funcione
            });
          });
        }

        attach(saldoCells);
        attach(pagoCells);

        // Botones de copiar columna
        document.querySelectorAll('.btn-copy').forEach(btn => {
          btn.onclick = async (e) => {
            e.stopPropagation();
            const field = btn.dataset.field;
            const ed = edificios[edKey];
            // Generar lista de valores con coma decimal (formato Excel argentino)
            const values = ed.unidades.map(u => {
              const v = u[field];
              if (v === null || v === undefined) return '';
              return String(v).replace('.', ',');
            });
            const text = values.join('\n');
            try {
              await navigator.clipboard.writeText(text);
              btn.classList.add('copied');
              const original = btn.textContent;
              btn.textContent = '✓';
              setTimeout(() => {
                btn.classList.remove('copied');
                btn.textContent = original;
              }, 1500);
            } catch (err) {
              console.error('Error al copiar:', err);
              alert('No se pudo copiar al portapapeles');
            }
          };
        });
      }

      // Iniciar
      loadData();
    }
  </script>
</body>
</html>
